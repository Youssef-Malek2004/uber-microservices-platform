spring:
  application:
    name: ride-service
  datasource:
    url: jdbc:postgresql://ride-postgres:5432/uberdb-rides
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      separator: ^^
  mongodb:
    uri: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
  data:
    redis:
      host: redis
      port: 6379
      password: redispass
    neo4j:
      uri: bolt://neo4j:7687
      username: neo4j
      password: neo4jpass
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    template:
      observation-enabled: true
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        observation-enabled: true
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

server:
  port: 8080
jwt:
  secret: "bXlzdXBlcnNlY3JldGtleWZvcmp3dGF1dGhlbnRpY2F0aW9u"
  expiration: 86400000

feign:
  user-service:
    url: ${FEIGN_USER_SERVICE_URL:http://user-service:8080}
  driver-service:
    url: ${FEIGN_DRIVER_SERVICE_URL:http://driver-service:8080}
  ride-service:
    url: ${FEIGN_RIDE_SERVICE_URL:http://ride-service:8080}
  location-service:
    url: ${FEIGN_LOCATION_SERVICE_URL:http://location-service:8080}
  payment-service:
    url: ${FEIGN_PAYMENT_SERVICE_URL:http://payment-service:8080}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException
      driver-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException
      location-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info,circuitbreakers"
  health:
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true