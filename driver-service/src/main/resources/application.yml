spring:
  application:
    name: driver-service

  mvc:
    servlet:
      load-on-startup: 1

  datasource:
    url: jdbc:postgresql://driver-postgres:5432/uberdb-drivers
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      separator: "^^"

  data:
    mongodb:
      uri: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
    redis:
      host: redis
      port: 6379
      password: redispass

  elasticsearch:
    uris: http://elasticsearch:9200

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

server:
  port: 8080

feign:
  ride-service:
    url: http://ride-service:8080
  user-service:
    url: http://user-service:8080

jwt:
  secret: "bXlzdXBlcnNlY3JldGtleWZvcmp3dGF1dGhlbnRpY2F0aW9u"
  expiration: 86400000

resilience4j:
  circuitbreaker:
    instances:
      ride-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException
      user-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info,circuitbreakers"
  health:
    circuitbreakers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
