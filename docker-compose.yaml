services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: uber-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5      

  user-postgres:
    image: postgres:17
    container_name: uber-user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uberdb-users
    volumes:
      - user-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberdb-users"]
      interval: 10s
      timeout: 5s
      retries: 5      

  driver-postgres:
    image: postgres:17
    container_name: uber-driver-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uberdb-drivers
    volumes:
      - driver-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberdb-drivers"]
      interval: 10s
      timeout: 5s
      retries: 5

  ride-postgres:
    image: postgres:17
    container_name: uber-ride-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uberdb-rides
    volumes:
      - ride-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberdb-rides"]
      interval: 10s
      timeout: 5s
      retries: 5

  location-postgres:
    image: postgres:17
    container_name: uber-location-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uberdb-locations
    volumes:
      - location-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberdb-locations"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-postgres:
    image: postgres:17
    container_name: uber-payment-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uberdb-payments
    volumes:
      - payment-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uberdb-payments"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uber-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - driver-postgres
      - ride-postgres
      - location-postgres
      - payment-postgres
      - user-postgres

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: uber-api-gateway
    environment:
      JWT_SECRET: "bXlzdXBlcnNlY3JldGtleWZvcmp3dGF1dGhlbnRpY2F0aW9u"
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - driver-service
      - ride-service
      - location-service
      - payment-service


  ride-service:
    build:
      context: .
      dockerfile: ride-service/Dockerfile
    container_name: uber-ride-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ride-postgres:5432/uberdb-rides
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: neo4jpass
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8083:8080"
    depends_on:
      ride-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: uber-user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-postgres:5432/uberdb-users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8081:8080"
    depends_on:
      user-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  driver-service:
    build:
      context: .
      dockerfile: driver-service/Dockerfile
    container_name: uber-driver-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://driver-postgres:5432/uberdb-drivers
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
      SPRING_DATA_MONGODB_HOST: mongo
      SPRING_DATA_MONGODB_PORT: "27017"
      SPRING_DATA_MONGODB_DATABASE: ubermongo
      SPRING_DATA_MONGODB_USERNAME: root
      SPRING_DATA_MONGODB_PASSWORD: rootpass
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: redispass
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    ports:
      - "8082:8080"
    depends_on:
      driver-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  location-service:
    build:
      context: .
      dockerfile: location-service/Dockerfile
    container_name: uber-location-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://location-postgres:5432/uberdb-locations
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_DATA_CASSANDRA_PORT: 9042
      SPRING_DATA_CASSANDRA_LOCAL_DATACENTER: datacenter1
      SPRING_DATA_CASSANDRA_KEYSPACE_NAME: uberks
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      # Align the container clock with the test-client wall clock. The
      # stationary-window check (S4-F9) compares row.timestamp — written
      # verbatim from the client's LocalDateTime.now() — against the
      # server's own LocalDateTime.now(). Without an explicit TZ the
      # container defaults to UTC and a non-UTC host writes rows that
      # appear "fresh" to the UTC-anchored cutoff (tc358). Override via
      # `TZ=… docker compose up` for a different host.
      TZ: ${TZ:-Africa/Cairo}
      JAVA_TOOL_OPTIONS: "-Duser.timezone=${TZ:-Africa/Cairo}"
    ports:
      - "8084:8080"
    depends_on:
      location-postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: uber-payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-postgres:5432/uberdb-payments
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpass@mongo:27017/ubermongo?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: ubermongo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redispass
      SERVER_ERROR_INCLUDE_MESSAGE: always
      JVM_OPTS: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
    ports:
      - "8085:8080"
    depends_on:
      payment-postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:latest
    container_name: uber-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: ubermongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: uber-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispass --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.19.12
    container_name: uber-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  neo4j:
    image: neo4j:latest
    container_name: uber-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_heap_initial__size: 256m
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cassandra:
    image: cassandra:latest
    container_name: uber-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ubercluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_KEYSPACE: uberks
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
      JVM_OPTS: "-Dcassandra.skip_wait_for_gossip_to_settle=0 -Dcassandra.ring_delay_ms=1000 -Dcassandra.write_request_timeout_in_ms=30000"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep UN || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  driver-pgdata:
  ride-pgdata:
  location-pgdata:
  payment-pgdata:
  mongo-data:
  es-data:
  neo4j-data:
  cassandra-data:
  user-pgdata:

