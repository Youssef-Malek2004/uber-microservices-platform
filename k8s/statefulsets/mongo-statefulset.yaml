apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: uber
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: rootpass
            - name: MONGO_INITDB_DATABASE
              value: ubermongo
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            limits:
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - mongosh
                - --username
                - root
                - --password
                - rootpass
                - --authenticationDatabase
                - admin
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            timeoutSeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --username
                - root
                - --password
                - rootpass
                - --authenticationDatabase
                - admin
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            timeoutSeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
